<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#edf2f7" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000" flood-opacity="0.13"/>
    </filter>
    <style>
      .title { font: 800 40px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #172033; }
      .subtitle { font: 600 22px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .layer-label { font: 800 26px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #263238; }
      .layer-title { font: 800 27px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #1f2937; }
      .module-text { font: 700 23px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #263238; }
      .small-text { font: 700 20px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #334155; }
      .box { stroke: #263238; stroke-width: 2.8; rx: 14; ry: 14; filter: url(#shadow); }
      .module { stroke: #263238; stroke-width: 2.4; rx: 10; ry: 10; }
      .arrow { stroke: #334155; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .thin-arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="#fbfcf7"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.9"/>

  <text x="960" y="58" text-anchor="middle" class="title">交通信号控制系统总体架构图</text>
  <text x="960" y="94" text-anchor="middle" class="subtitle">前端大屏统一接入 Spring Boot 主后端，后端编排 CityFlow 仿真、策略控制、应急绿波、数据分析与智能体服务</text>

  <!-- Left layer labels -->
  <rect x="36" y="125" width="150" height="88" fill="#f8c8ce" class="box"/>
