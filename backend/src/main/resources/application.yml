server:
  port: ${SERVER_PORT:8080}

logging:
  file:
    name: ${BACKEND_LOG_FILE:logs/traffic-signal-backend.log}
  level:
    com.traffic.agent: DEBUG
    AGENT_DEBUG: DEBUG

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
      - optional:file:backend/.env[.properties]
  application:
    name: traffic-signal-backend
  profiles:
    group:
      lan:
        - postgres
        - lan-server
  datasource:
    url: jdbc:h2:mem:traffic_signal;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/h2
  mail:
    host: ${QQ_MAIL_HOST:smtp.qq.com}
    port: ${QQ_MAIL_PORT:465}
    username: ${QQ_MAIL_USERNAME:}
    password: ${QQ_MAIL_AUTH_CODE:}
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            fallback: false

auth:
  mail:
    from: ${QQ_MAIL_FROM:${QQ_MAIL_USERNAME:}}
    sender-name: ${QQ_MAIL_SENDER_NAME:信号灯配时控制系统}
  captcha:
    ttl-minutes: ${AUTH_CAPTCHA_TTL_MINUTES:5}
    resend-interval-seconds: ${AUTH_CAPTCHA_RESEND_INTERVAL_SECONDS:60}
  invite-code: ${AUTH_INVITE_CODE:123456}
  initial-account:
    username: ${AUTH_INITIAL_USERNAME:admin}
    password: ${AUTH_INITIAL_PASSWORD:123456}
    email: ${AUTH_INITIAL_EMAIL:admin@traffic.local}

cityflow:
  base-url: ${CITYFLOW_BASE_URL:http://39.105.75.87:9000}
  health-path: ${CITYFLOW_HEALTH_PATH:/health}
  api-token: ${CITYFLOW_API_TOKEN:jLEc-o3L16migUKQ7f_OlH94qsjEstFf}
  client-id: ${CITYFLOW_CLIENT_ID:hcj}
  default-scene-id: jinan_3x4
  frame-poll-interval-ms: ${CITYFLOW_FRAME_POLL_INTERVAL_MS:500}

traffic-r:
  enabled: ${TRAFFIC_R_ENABLED:true}
  base-url: ${TRAFFIC_R_BASE_URL:http://127.0.0.1:16008}
  health-path: ${TRAFFIC_R_HEALTH_PATH:/health}
  predict-path: ${TRAFFIC_R_PREDICT_PATH:/predict}
  batch-predict-path: ${TRAFFIC_R_BATCH_PREDICT_PATH:/predict-batch}
  decision-interval-sec: ${TRAFFIC_R_DECISION_INTERVAL_SEC:20}
  timeout-sec: ${TRAFFIC_R_TIMEOUT_SEC:60}
  fallback-controller: ${TRAFFIC_R_FALLBACK_CONTROLLER:max-pressure}

bailian:
  knowledge:
    enabled: true
    endpoint: bailian.cn-beijing.aliyuncs.com
    access-key-id: LTAI5t7cVU95tR95K6DmGS3q
    access-key-secret: ixO8MXBUm453MwiRJdkLrdMT7NomBd
    workspace-id: ws-jpr8zalhgfz2nrmp
    index-id: ez9exox9rx
    dense-top-k: 100
    sparse-top-k: 100
    enable-reranking: true
    rerank-top-n: 5
traffic:
  agent:
    langchain4j:
      enabled: ${AGENT_LANGCHAIN4J_ENABLED:true}
      base-url: ${LLM_BASE_URL:${DASHSCOPE_COMPATIBLE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}}
      api-key: ${LLM_API_KEY:${DASHSCOPE_API_KEY:sk-ws-H.EMEIXEP.1XNE.MEUCIHWhOCZ_oD7oSqIrYymkRZZpq8DQrhiIi4P6gasppFI9AiEA2dYvsYJmR4nIkWjpZNJxfzc0R9WTiFzf4qITCUUWknA}}
      model-name: ${LLM_MODEL:${DASHSCOPE_MODEL:qwen3-8b-5e18191e0066}}
      temperature: ${AGENT_MODEL_TEMPERATURE:0.2}
      max-tokens: ${AGENT_MODEL_MAX_TOKENS:1200}
      timeout-seconds: ${AGENT_MODEL_TIMEOUT_SECONDS:60}
      enable-thinking: ${AGENT_MODEL_ENABLE_THINKING:false}

---

spring:
  config:
    activate:
      on-profile: lan-server

server:
  address: ${SERVER_ADDRESS:0.0.0.0}

---

spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://120.48.99.240:5432/traffic_signal
    username: ${TRAFFIC_DB_USERNAME:traffic_user}
    password: ${TRAFFIC_DB_PASSWORD:123456}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: ${TRAFFIC_DB_FLYWAY_ENABLED:true}
    locations:
      - classpath:db/migration/common
      - classpath:db/migration/postgresql
