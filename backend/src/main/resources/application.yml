server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: traffic-signal-backend
  profiles:
    group:
      lan:
        - postgres
        - lan-server
  datasource:
    url: jdbc:h2:mem:traffic_signal;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

cityflow:
  base-url: ${CITYFLOW_BASE_URL:http://localhost:9000}
  default-scene-id: jinan_3x4
  frame-poll-interval-ms: 200

---

spring:
  config:
    activate:
      on-profile: lan-server

server:
  address: ${SERVER_ADDRESS:0.0.0.0}

---

spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: ${TRAFFIC_DB_URL:jdbc:postgresql://${TRAFFIC_DB_HOST:localhost}:${TRAFFIC_DB_PORT:5432}/${TRAFFIC_DB_NAME:traffic_signal}}
    username: ${TRAFFIC_DB_USERNAME:postgres}
    password: ${TRAFFIC_DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: false
