server:
  port: 8080

spring:
  application:
    name: traffic-signal-backend
  datasource:
    url: jdbc:h2:mem:traffic_signal;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

cityflow:
  base-url: http://localhost:9000
  default-scene-id: jinan_3x4
  frame-poll-interval-ms: 200
