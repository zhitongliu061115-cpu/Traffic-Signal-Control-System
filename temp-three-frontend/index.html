<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CityFlow Three.js 临时联调视图</title>
  </head>
  <body>
    <main id="app">
      <section class="hud" aria-label="simulation metrics">
        <div class="brand">
          <span class="dot" id="statusDot"></span>
          <div>
            <strong>CityFlow 实时仿真</strong>
            <small id="statusText">初始化中</small>
          </div>
        </div>
        <div class="strategy-panel" aria-label="control strategy">
          <label for="sceneSelect">Scene</label>
          <select id="sceneSelect">
            <option value="jinan_3x4_stress" selected>Jinan Stress</option>
            <option value="jinan_3x4">Jinan Normal</option>
            <option value="hangzhou_4_4">Hangzhou 4x4</option>
          </select>
          <label for="controllerSelect">控制方法</label>
          <select id="controllerSelect">
            <option value="traffic-r">RL</option>
            <option value="max-pressure">Max Pressure</option>
            <option value="fixed-time">固定配时</option>
          </select>
          <label for="speedSelect">Speed</label>
          <select id="speedSelect">
            <option value="1">1x</option>
            <option value="5">5x</option>
            <option value="10">10x</option>
            <option value="10" selected>10x</option>
            <option value="20">20x</option>
          </select>
          <button id="recreateButton" type="button">切换</button>
        </div>
        <div class="controls" aria-label="simulation controls">
          <button id="toggleRunButton" type="button" disabled>启动</button>
          <button id="stopButton" type="button" disabled>停止</button>
        </div>

        <div class="ev-panel" id="evPanel" aria-label="EV dispatch">
          <div class="ev-panel-header" id="evPanelToggle">
            <span>🚨 EV 应急调度</span>
            <span class="ev-toggle-icon" id="evToggleIcon">▼</span>
          </div>
          <div class="ev-panel-body" id="evPanelBody">
            <div class="ev-form-row">
              <label for="evStartX">起点 X</label><input id="evStartX" type="number" value="100" step="1">
              <label for="evStartY">起点 Y</label><input id="evStartY" type="number" value="700" step="1">
            </div>
            <div class="ev-form-row">
              <label for="evEndX">终点 X</label><input id="evEndX" type="number" value="800" step="1">
              <label for="evEndY">终点 Y</label><input id="evEndY" type="number" value="700" step="1">
            </div>
            <div class="ev-form-row">
              <label for="evId">车辆 ID</label><input id="evId" type="text" value="ev_001">
              <label for="evType">类型</label>
              <select id="evType">
                <option value="fire_truck">消防车</option>
                <option value="ambulance" selected>救护车</option>
                <option value="police">警车</option>
                <option value="convoy">车队</option>
              </select>
            </div>
            <div class="ev-form-row">
              <label for="evPriority">优先级</label><input id="evPriority" type="number" value="1" min="1" max="5" step="1">
              <label for="evSpeed">最高速度</label><input id="evSpeed" type="number" value="20" min="1" max="50" step="1">
            </div>
            <button id="evDispatchButton" type="button">🚀 调度应急车</button>
            <div class="ev-status" id="evStatusDisplay"></div>
          </div>
        </div>
        <div class="metrics">
          <div><span>累计发车</span><strong id="scheduledDepartureCount">0</strong></div>
          <div><span>当前在网</span><strong id="vehicleCount">0</strong></div>
          <div><span>排队</span><strong id="queueCount">0</strong></div>
          <div><span>均速</span><strong id="avgSpeed">0.0</strong></div>
          <div><span>完成车辆</span><strong id="throughput">0</strong></div>
        </div>
      </section>
      <section class="cityflow-apply-panel" aria-label="cityflow applied decision">
        <div>
          <span>当前策略</span>
          <strong id="activeController">RL</strong>
        </div>
        <div>
          <span>CityFlow 应用</span>
          <strong id="cityflowApplyState">等待</strong>
        </div>
        <div>
          <span>应用相位</span>
          <strong id="cityflowAppliedPhase">等待</strong>
        </div>
      </section>
      <section class="scene-shell">
        <canvas id="trafficCanvas"></canvas>
      </section>
      <section class="legend" aria-label="legend">
        <span><i class="free"></i>畅通</span>
        <span><i class="slow"></i>缓行</span>
        <span><i class="jammed"></i>拥堵</span>
        <span><i class="signal"></i>放行相位</span>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
